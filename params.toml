# ============================================================
#  Experiment parameters — all algorithm + function combos
# ============================================================
#
#  Structure:
#    [<dataset>]            — dataset-level settings
#    [<dataset>.<alg>]      — sweep params for that alg on that dataset
#    [<dataset>.compare_all.<alg>]  — best config used in "Compare All"
#
#  Datasets:  logistic_australian | logistic_rcv1 | quadratic | rosenbrock
#  Algs:      gd | sgd | momentum | nag | adam
# ============================================================


# ── Logistic Regression — Australian ────────────────────────

[logistic_australian]
path    = "data/australian_scale.txt"
n_iters = 200

[logistic_australian.gd]
learning_rates = [0.01, 0.1, 3, 4, 6]

[logistic_australian.sgd]
learning_rates    = [0.01, 0.1, 0.5, 1]
large_n_threshold = 10000   # datasets larger than this use n_epochs_large
n_epochs_large    = 50

[logistic_australian.momentum]
lr_sweep              = [0.01, 0.1, 1.5, 4]
fixed_beta_for_lr     = 0.85
beta_sweep            = [0.5, 0.8, 0.9, 0.99]
fixed_lr_for_beta     = 1.5
sensitivity_lr_grid   = [0.001, 0.01, 0.1, 1, 2, 4, 8]
sensitivity_beta_grid = [0.5, 0.7, 0.8, 0.9, 0.99]

[logistic_australian.nag]
lr_sweep              = [0.01, 0.1, 2, 3]
fixed_beta_for_lr     = 0.95
beta_sweep            = [0.5, 0.8, 0.95, 0.99]
fixed_lr_for_beta     = 2
sensitivity_lr_grid   = [0.001, 0.01, 0.1, 1, 2, 4]
sensitivity_beta_grid = [0.5, 0.7, 0.8, 0.9, 0.99, 0.999]

[logistic_australian.adam]
lr_sweep              = [1.0e-3, 0.1, 1, 2, 4]
fixed_beta1_for_lr    = 0.85
fixed_beta2_for_lr    = 0.997
beta1_sweep           = [0.5, 0.85, 0.9, 0.99]
fixed_lr_for_beta1    = 1
fixed_beta2_for_beta1 = 0.999
beta2_sweep           = [0.7, 0.99, 0.999, 0.9999]
fixed_lr_for_beta2    = 1
fixed_beta1_for_beta2 = 0.9

[logistic_australian.compare_all.gd]
lr = 0.3

[logistic_australian.compare_all.sgd]
lr         = 0.5
batch_size = 64

[logistic_australian.compare_all.momentum]
lr   = 1.5
beta = 0.85

[logistic_australian.compare_all.nag]
lr   = 2
beta = 0.95

[logistic_australian.compare_all.adam]
lr    = 1
beta1 = 0.9
beta2 = 0.999


# ── Logistic Regression — RCV1 ──────────────────────────────

[logistic_rcv1]
path    = "data/rcv1_train.binary"
n_iters = 100

[logistic_rcv1.gd]
learning_rates = [256, 1024, 2048, 2500] 

[logistic_rcv1.sgd]
learning_rates    = [128, 1024, 2048, 4096, 16384] 
large_n_threshold = 10000
n_epochs_large    = 50

[logistic_rcv1.momentum]
lr_sweep              = [64, 1024, 2048, 8192, 12288]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.8, 0.9, 0.95, 0.99]
fixed_lr_for_beta     = 2048
sensitivity_lr_grid   = [64, 512, 1024, 4096]
sensitivity_beta_grid = [0.5, 0.9, 0.95, 0.99]

[logistic_rcv1.nag]
lr_sweep              = [64, 1024, 2048, 4096, 8192, 12288]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.85, 0.9, 0.95, 0.99]
fixed_lr_for_beta     = 2048
sensitivity_lr_grid   = [64, 512, 1024, 4096]
sensitivity_beta_grid = [0.5, 0.9, 0.95, 0.99]

[logistic_rcv1.adam]
lr_sweep              = [0.01, 0.1, 10, 64]
fixed_beta1_for_lr    = 0.9
fixed_beta2_for_lr    = 0.99
beta1_sweep           = [0.5, 0.85, 0.9, 0.99]
fixed_lr_for_beta1    = 10
fixed_beta2_for_beta1 = 0.99
beta2_sweep           = [0.5, 0.99, 0.999, 0.9999]
fixed_lr_for_beta2    = 10
fixed_beta1_for_beta2 = 0.9

[logistic_rcv1.compare_all.gd]
lr = 2048

[logistic_rcv1.compare_all.sgd]
lr         = 2048
batch_size = 512

[logistic_rcv1.compare_all.momentum]
lr   = 2048
beta = 0.95

[logistic_rcv1.compare_all.nag]
lr   = 2048
beta = 0.95

[logistic_rcv1.compare_all.adam]
lr    = 10
beta1 = 0.9
beta2 = 0.99


# ── Quadratic Bowl ──────────────────────────────────────────

[quadratic]
n_iters = 100
w0      = [3.0, 4.0]
A       = [[3.0, 1.0], [1.0, 2.0]]
b       = [2.0, 5.0]

[quadratic.gd]
learning_rates = [1.0e-5, 1.0e-4, 5.0e-4, 1.0e-2]

[quadratic.momentum]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.9, 0.99]
fixed_lr_for_beta     = 5.0e-4
sensitivity_lr_grid   = [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4, 1.0e-3]
sensitivity_beta_grid = [0.5, 0.7, 0.9, 0.95, 0.99]

[quadratic.nag]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.9, 0.99]
fixed_lr_for_beta     = 5.0e-4
sensitivity_lr_grid   = [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4, 1.0e-3]
sensitivity_beta_grid = [0.5, 0.7, 0.9, 0.95, 0.99]

[quadratic.adam]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta1_for_lr    = 0.9
fixed_beta2_for_lr    = 0.999
beta1_sweep           = [0.5, 0.9, 0.99]
fixed_lr_for_beta1    = 5.0e-4
fixed_beta2_for_beta1 = 0.999
beta2_sweep           = [0.9, 0.99, 0.999]
fixed_lr_for_beta2    = 5.0e-4
fixed_beta1_for_beta2 = 0.9

[quadratic.compare_all.gd]
