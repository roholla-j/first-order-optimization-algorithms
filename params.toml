beta1 = 0.9
beta2 = 0.999


# ── Quadratic Bowl ──────────────────────────────────────────

[quadratic]
n_iters = 100
w0      = [3.0, 4.0]
A       = [[3.0, 1.0], [1.0, 2.0]]
b       = [2.0, 5.0]

[quadratic.gd]
learning_rates = [1.0e-5, 1.0e-4, 5.0e-4, 1.0e-2]

[quadratic.momentum]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.9, 0.99]
fixed_lr_for_beta     = 5.0e-4
sensitivity_lr_grid   = [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4, 1.0e-3]
sensitivity_beta_grid = [0.5, 0.7, 0.9, 0.95, 0.99]

[quadratic.nag]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta_for_lr     = 0.9
beta_sweep            = [0.5, 0.9, 0.99]
fixed_lr_for_beta     = 5.0e-4
sensitivity_lr_grid   = [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4, 1.0e-3]
sensitivity_beta_grid = [0.5, 0.7, 0.9, 0.95, 0.99]

[quadratic.adam]
lr_sweep              = [1.0e-4, 5.0e-4, 1.0e-3]
fixed_beta1_for_lr    = 0.9
fixed_beta2_for_lr    = 0.999
beta1_sweep           = [0.5, 0.9, 0.99]
fixed_lr_for_beta1    = 5.0e-4
fixed_beta2_for_beta1 = 0.999
beta2_sweep           = [0.9, 0.99, 0.999]
fixed_lr_for_beta2    = 5.0e-4
fixed_beta1_for_beta2 = 0.9

[quadratic.compare_all.gd]
