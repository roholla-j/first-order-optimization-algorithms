[quadratic.compare_all.momentum]
lr   = 1.0e-3
beta = 0.9

[quadratic.compare_all.nag]
lr   = 1.0e-3
beta = 0.9

[quadratic.compare_all.adam]
lr    = 1.0e-2
beta1 = 0.9
beta2 = 0.999


