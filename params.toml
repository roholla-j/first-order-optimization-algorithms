sensitivity_lr_grid   = [1.0e-4, 1.0e-3, 5.0e-3, 0.01, 0.05, 0.1, 0.5]
sensitivity_beta_grid = [0.5, 0.7, 0.9, 0.95, 0.99]

[logistic_rcv1.adam]
